name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check app tests

  # ── Backend: test ──────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opstrack
          POSTGRES_PASSWORD: opstrack
          POSTGRES_DB: opstrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opstrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://opstrack:opstrack@localhost:5432/opstrack_test
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret-key
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --tb=short

  # ── Web: lint + build ──────────────────────────────────────────────────────
  web-build:
    name: Web lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vite build (smoke test)
        run: npm run build
        env:
          # Placeholder so Vite doesn't warn; the real value is set at deploy time
          VITE_API_BASE_URL: http://localhost:5000

  # ── Deploy to Railway ─────────────────────────────────────────────────────
  # Railway deploys automatically via "Wait for CI" (enabled in the Railway
  # dashboard). No explicit deploy step needed here — Railway watches this
  # workflow and deploys only after all jobs above pass.
